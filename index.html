<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ToDo List</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"><script defer="defer" src="main.js"></script></head><body><section id="left-sidebar"><div class="sidebar-head"><h1><i class="fa-solid fa-list-check"></i> Todo List <button id="sidebar-close"><i class="fa-solid fa-xmark"></i></button></h1></div><div id="views"><ol><li><button class="view-buttons" data-view="inbox"><i class="fa-solid fa-inbox"></i>Inbox</button></li><li><button class="view-buttons" data-view="today"><i class="fa-solid fa-calendar-day"></i>Today</button></li><li><button class="view-buttons" data-view="upcoming"><i class="fa-solid fa-calendar-week"></i>This Week</button></li><li><button class="view-buttons" data-view="completed"><i class="fa-regular fa-calendar-check"></i>Completed</button></li><li><button class="view-buttons" data-view="trash"><i class="fa-solid fa-trash"></i>Trash</button></li></ol></div><div id="projects"><div class="header"><h2>Projects</h2><button id="add-project"><i class="fa-solid fa-circle-plus"></i></button></div><div id="project-add-form"></div><ul id="project-container">Here comes project lists</ul></div></section><header><div class="header-left"><button id="sidebar-toggle"><i class="fa-solid fa-bars"></i></button><form class="search"><label for="searchbar"><i class="fa-solid fa-magnifying-glass"></i></label> <input type="search" id="searchbar" placeholder="Search Todo in Current View"> <button type="submit" style="display:none"></button></form></div><div class="right-section"><button class="header-nav-button" data-view="notification"><i class="fa-solid fa-bell" id="notif-icon"></i></button> <button class="header-nav-button" data-view="trash"><i class="fa-solid fa-trash"></i></button> <button class="header-nav-button" data-view="theme-toggle"><i class="fa-solid fa-sun"></i></button> <button id="analysis-toggle"><i class="fa-solid fa-chart-pie"></i></button></div></header><section id="main"><div class="header"><h2 class="title" id="page-title">Title</h2><button id="add-todo"><i class="fa-solid fa-circle-plus"></i>Todo</button></div><div class="sort-filter-section"><label id="sort">Sort By <select name="sort"><option value="sort-createDate-new" selected="selected">Date Created(New)</option><option value="sort-createDate-old">Date Created(Old)</option><option value="sort-dueDate">Due Date</option><option value="sort-priority">Priority</option><option value="sort-title-a-z">Title(Aa-Zz)</option><option value="sort-title-z-a">Title(Zz-Aa)</option></select></label> <label id="filter">Filter <select name="filter"><option value="filter-all" selected="selected">All</option><option value="filter-overdue">Overdue</option><option value="filter-completed">Completed</option><option value="filter-pending">Pending</option><option value="filter-Low">Priority: Low</option><option value="filter-Medium">Priority: Medium</option><option value="filter-High">Priority: High</option></select></label></div><div class="container"><ul id="todoList">todo lists appear here</ul></div><section id="trash-view" hidden><div class="todo-container"><h3>Deleted Todos</h3><ul id="trash-todos"></ul></div><div class="project-container"><h3>Archived Projects</h3><ul id="trash-projects"></ul></div></section></section><section id="right-sidebar"><div class="analytics-section"><h2>Current View Analytics</h2><div class="chart-box"><canvas id="todoChart"></canvas></div></div><div class="analytics-section"><h2>Global Analytics</h2><div class="chart-box"><canvas id="globalChart"></canvas></div></div></section><dialog id="add-todo-modal"><form id="add-todo-form" method="dialog"><h2>Add Todo</h2><label>Task Name <input name="title" required></label> <label>Due Date <input type="date" name="dueDate"></label> <label>Priority <select name="priority"><option value="Low" selected="selected">Low</option><option value="Medium">Medium</option><option value="High">High</option></select></label> <label>Description <textarea name="description"></textarea></label> <label>Notes <textarea name="note"></textarea></label><section class="checklist-section"><p>Checklist</p><div><ul id="checklist-items"></ul><div class="checklist-input"><input id="checklist-input" placeholder="Add checklist item"> <button type="button" id="add-checklist-item">Add</button></div></div></section><div class="modal-actions"><button type="submit">Add Todo</button> <button type="button" data-close><i class="fa-solid fa-circle-xmark"></i></button></div></form></dialog><div id="notif-dropdown" class="hidden"><div class="notif-header"><h2>Notifications</h2></div><div id="notif-container"></div></div></body></html>
